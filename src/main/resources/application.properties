spring.application.name=orders
server.port=8080

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer

spring.datasource.url=jdbc:mysql://localhost:3306/ekart
spring.datasource.username=kuber
spring.datasource.password=kuber

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true
Logging.level.org.springframework.web=DEBUG
Logging.level.com.fasterxml.jackson.databind=DEBUG


# Inventory (Feign) — synchronously validates product exists & price when placing an order.
# Payment and shipping run only via Kafka; no Feign URLs here.
inventory.service.url=http://localhost:8084
