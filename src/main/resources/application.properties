spring.application.name=orders
server.port=8080

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/ordersdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true
Logging.level.org.springframework.web=DEBUG
Logging.level.com.fasterxml.jackson.databind=DEBUG


# Inventory (Feign) — synchronously validates product exists & price when placing an order.
# When running in Docker Compose the orders container must call the inventory service by
# Docker service name (not localhost). The default points to the Compose service name `inventory-service`.
# Override via environment variable INVENTORY_SERVICE_URL if needed.
 inventory.service.url=${INVENTORY_SERVICE_URL:localhost:8082}

